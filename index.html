    <!-- Canonical URL: updated immediately for React routes before the app hydrates. -->
    <link rel="canonical" href="https://visiomatix.in/" />
    <script>
      (function () {
        var canonical = document.querySelector('link[rel="canonical"]');
        var path = window.location.pathname === "/" ? "/" : window.location.pathname.replace(/\/+$/, "");
        var url = "https://visiomatix.in" + path;
        canonical.setAttribute("href", url);
      })();
    </script>
